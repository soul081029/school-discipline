<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교내 생활 지도 관리</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <div class="title-box">
            <h1>교내 생활 지도 관리</h1>
        </div>

        <div class="checklist-panel">
            <div id="record-section" class="hidden">
                <input type="text" id="student-id" placeholder="학번">
                <input type="text" id="student-name" placeholder="이름">
        
                <div id="dress-code-violations">
                    <h3>복장 단속</h3>
                    <label><input type="checkbox" name="dress-code" value="교복 미착용 및 교복 변형"> 교복 미착용 및 교복 변형</label>
                    <label><input type="checkbox" name="dress-code" value="실내화 등교"> 실내화 등교</label>
                    <label class="other-label">
                        <input type="checkbox" id="dress-code-other-check"> 기타
                        <input type="text" id="dress-code-other-text" class="hidden" placeholder="기타 위반사항 입력">
                    </label>
                </div>
        
                <div id="electronic-device-violation">
                    <h3>전자기기 위반</h3>
                    <label><input type="checkbox" name="device-violation" value="무단 전자기기 사용"> 무단 전자기기 사용</label>
                    <label class="other-label">
                        <input type="checkbox" id="device-violation-other-check"> 기타
                        <input type="text" id="device-violation-other-text" class="hidden" placeholder="기타 위반사항 입력">
                    </label>
                </div>
        
                <button id="save-violation">저장</button>
            </div>
        </div>

        <!-- 버튼들은 JS 기능 유지를 위해 ID 그대로 사용 -->
        <button id="record-violation-btn">기록</button>
        <button id="teacher-auth-btn">권한 로그인</button>

    </div>

    <!-- 비밀번호 모달은 디자인 변경 요구사항에 없었으므로 그대로 유지 -->
    <div id="password-modal" class="hidden">
        <div class="modal-content">
            <h2>비밀번호 입력</h2>
            <input type="password" id="teacher-password" placeholder="비밀번호">
            <button id="password-submit">확인</button>
            <button id="password-cancel">취소</button>
        </div>
    </div>

        <!-- 관리자 이메일/비밀번호 로그인 모달 (기본 hidden) -->
        <div id="login-modal" class="hidden">
            <div class="login-modal-content">
                <h2>관리자 로그인</h2>

                <input type="email" id="admin-email" placeholder="이메일 입력">
                <input type="password" id="admin-password" placeholder="비밀번호 입력">

                <button id="login-submit">로그인</button>
                <button id="login-cancel">취소</button>
            </div>
        </div>

    <script src="app.js" type="module"></script>
</body>
</html>
