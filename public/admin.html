<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 페이지 - 레이아웃</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>

    <style>
    /* Page background */
    html, body { height: 100%; margin: 0; background: #FAF9F6; }
    .container { position: relative; width: 100%; height: 100vh; }

    /* 1) 기록 조회 배경 판 */
    .record-card {
        position: absolute;
        left: 7.5521%; /* 145 / 1920 */
        top: 6.2963%;  /* 68 / 1080 */
        width: 39.5833%; /* 760 / 1920 */
        height: 87.3148%; /* 943 / 1080 */
        background: #FFFCF3;
        border-radius: 100px;
        box-shadow: 25px 25px 30px rgba(0,0,0,0.25);
        z-index: 1;
    }

    /* 2) 횟수 조회 배경 판 */
    .count-card {
        position: absolute;
        left: 52.8646%; /* 1015 / 1920 */
        top: 6.2963%;
        width: 39.5833%;
        height: 87.3148%;
        background: #FFFCF3;
        border-radius: 100px;
        box-shadow: 25px 25px 30px rgba(0,0,0,0.25);
        z-index: 1;
    }

    /* 3) 기록 조회 내부 판 */
    .record-inner {
        position: absolute;
        left: 9.8958%; /* 190 / 1920 */
        top: 9.5370%;  /* 103 / 1080 */
        width: 34.8958%; /* 670 / 1920 */
        height: 14.6296%; /* 158 / 1080 */
        background: #FAF9F6;
        border-radius: 100px;
        box-shadow: 0 0 20px rgba(0,0,0,0.1);
        z-index: 2;
    }

    /* 4) 횟수 조회 내부 판 */
    .count-inner {
        position: absolute;
        left: 55.2083%; /* 1060 / 1920 */
        top: 9.5370%;
        width: 34.8958%;
        height: 14.6296%;
        background: #FAF9F6;
        border-radius: 100px;
        box-shadow: 0 0 20px rgba(0,0,0,0.1);
        z-index: 2;
    }

    /* 5) / 6) 제목 텍스트 */
    .title-record {
        position: absolute;
        left: 12.1354%; /* 233 / 1920 */
        top: 12.0370%;  /* 130 / 1080 */
        color: #EB8F26;
        font-size: 40px;
        font-weight: 800;
        z-index: 3;
    }
    .title-count {
        position: absolute;
        left: 57.4479%; /* 1103 / 1920 */
        top: 12.0370%;
        color: #EB8F26;
        font-size: 40px;
        font-weight: 800;
        z-index: 3;
    }

    /* Toggle buttons (date / period etc.) */
    .toggle {
        position: absolute;
        border-radius: 100px;
        background: #FAF9F6;
        border: 2px solid #D9D9D9;
        color: #737373;
        font-size: 24px;
        font-weight: 500;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 4;
    }

    .toggle-date { left: 12.1354%; top: 18.0556%; width: 14.2188%; height: 3.6111%; }
    .toggle-period { left: 28.2813%; top: 18.0556%; width: 14.2188%; height: 3.6111%; }
    .toggle-period-count { left: 57.4479%; top: 18.0556%; width: 14.2188%; height: 3.6111%; }
    .toggle-count-by { left: 73.5938%; top: 18.0556%; width: 14.2188%; height: 3.6111%; }

    /* 돌아가기 버튼 */
    .back-btn {
        position: absolute;
        left: 88.75%; /* 1704 / 1920 */
        top: 93.6111%; /* 1011 / 1080 */
        color: #898989;
        font-size: 32px;
        font-weight: 400;
        text-decoration: underline;
        cursor: pointer;
        z-index: 5;
    }

    /* Simple responsiveness: ensure text doesn't overflow cards */
    h1 { margin: 0; padding: 0 20px; }
    </style>

</head>

<body>

    <div class="container">

        <!-- 좌우 카드 -->
        <div class="record-card"></div>
        <div class="count-card"></div>

        <!-- 내부 판 (겹쳐짐) -->
        <div class="record-inner"></div>
        <div class="count-inner"></div>

        <!-- 텍스트 -->
        <div class="title-record">일별 기록 조회</div>
        <div class="title-count">누적 횟수 조회</div>

        <!-- 토글 버튼(레이아웃용, 기능 없음) -->
        <div class="toggle toggle-date">날짜</div>
        <div class="toggle toggle-period">누적 기간</div>
        <div class="toggle toggle-period-count">누적 기간</div>
        <div class="toggle toggle-count-by">누적 횟수 별 조회</div>

        <!-- 로딩 스크린 및 관리자 패널 -->
        <div id="loading-screen" style="position:fixed;left:0;top:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.9);z-index:2000;">
            <div style="text-align:center;color:#3D403A;font-size:24px;font-weight:700;">로딩 중... 잠시만 기다려주세요.</div>
        </div>

        <div id="admin-content" class="hidden">
            <div id="admin-panel" class="hidden" style="position:relative;padding:24px;z-index:100;">
                <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px;">
                    <div style="display:flex;align-items:center;gap:8px;">
                        <label for="date-picker" style="font-weight:600;margin-right:4px;color:#737373;">조회 날짜</label>
                        <input type="date" id="date-picker" />
                        <label for="daily-period-select" style="margin-left:8px;color:#737373;">누적기간</label>
                        <select id="daily-period-select" style="padding:6px;border-radius:6px;border:1px solid #ddd;">
                            <option value="전체">전체</option>
                            <option value="1학기">1학기</option>
                            <option value="2학기">2학기</option>
                        </select>
                        <button id="excel-download-daily" style="margin-left:8px;padding:6px 10px;border-radius:6px;background:#9DB394;color:#fff;border:none;">엑셀 다운로드(일별)</button>
                    </div>
                    <div style="display:flex;align-items:center;gap:8px;">
                        <label for="cumulative-period-select" style="color:#737373;">누적기간</label>
                        <select id="cumulative-period-select" style="padding:6px;border-radius:6px;border:1px solid #ddd;">
                            <option value="전체">전체</option>
                            <option value="1학기">1학기</option>
                            <option value="2학기">2학기</option>
                        </select>
                        <label for="count-threshold" style="margin-left:8px;color:#737373;">필터(회)</label>
                        <input id="count-threshold" type="number" min="0" placeholder="예: 2" style="width:80px;padding:6px;border-radius:6px;border:1px solid #ddd;" />
                        <button id="excel-download-cumulative" style="margin-left:8px;padding:6px 10px;border-radius:6px;background:#9DB394;color:#fff;border:none;">엑셀 다운로드(누적)</button>
                        <button id="logout-btn" style="margin-left:12px;padding:6px 10px;border-radius:6px;background:#777;color:#fff;border:none;">로그아웃</button>
                    </div>
                </div>

                <div style="display:flex;gap:12px;">
                    <!-- 좌측: 일별 기록(미리보기 영역은 아래의 고정 좌표 영역으로 렌더링) -->
                    <div style="flex:1;min-width:0"></div>
                    <!-- 우측: 누적 목록(렌더링 영역은 고정 좌표 영역) -->
                    <div style="flex:1;min-width:0"></div>
                </div>
            </div>
        </div>

        <!-- 좌측: 일별 기록 표 (지정 좌표, px 기준) -->
        <div id="daily-table-area" style="position:absolute;left:212px;top:308px;width:626px;height:645px;z-index:6;">
            <div id="daily-table-inner" style="width:100%;height:100%;overflow:auto;">
                <div id="daily-table" style="width:100%;height:100%;"></div>
            </div>
        </div>

        <!-- 우측: 누적 횟수 표 (지정 좌표, px 기준) -->
        <div id="cumulative-table-area" style="position:absolute;left:1082px;top:308px;width:626px;height:645px;z-index:6;">
            <div id="cumulative-table-inner" style="width:100%;height:100%;overflow:auto;">
                <div id="cumulative-table" style="width:100%;height:100%;"></div>
            </div>
        </div>

        <!-- 돌아가기 -->
        <div class="back-btn">돌아가기</div>

    </div>

    <!-- app.js는 유지하되 기능은 별도로 사용하지 않음 -->
    <script src="app.js" type="module"></script>

</body>
</html>
