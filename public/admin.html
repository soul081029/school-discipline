<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 페이지 - 레이아웃</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>

    <style>
    /* Page background */
    html, body { height: 100%; margin: 0; background: #FAF9F6; }
    .container { position: relative; width: 100%; height: 100vh; }

    /* 1) 기록 조회 배경 판 */
    .record-card {
        position: absolute;
        left: 7.5521%; /* 145 / 1920 */
        top: 6.2963%;  /* 68 / 1080 */
        width: 39.5833%; /* 760 / 1920 */
        height: 87.3148%; /* 943 / 1080 */
        background: #FFFCF3;
        border-radius: 100px;
        box-shadow: 25px 25px 30px rgba(0,0,0,0.25);
        z-index: 1;
    }

    /* 2) 횟수 조회 배경 판 */
    .count-card {
        position: absolute;
        left: 52.8646%; /* 1015 / 1920 */
        top: 6.2963%;
        width: 39.5833%;
        height: 87.3148%;
        background: #FFFCF3;
        border-radius: 100px;
        box-shadow: 25px 25px 30px rgba(0,0,0,0.25);
        z-index: 1;
    }

    /* 3) 기록 조회 내부 판 */
    .record-inner {
        position: absolute;
        left: 9.8958%; /* 190 / 1920 */
        top: 9.5370%;  /* 103 / 1080 */
        width: 34.8958%; /* 670 / 1920 */
        height: 14.6296%; /* 158 / 1080 */
        background: #FAF9F6;
        border-radius: 100px;
        box-shadow: 0 0 20px rgba(0,0,0,0.1);
        z-index: 2;
    }

    /* 4) 횟수 조회 내부 판 */
    .count-inner {
        position: absolute;
        left: 55.2083%; /* 1060 / 1920 */
        top: 9.5370%;
        width: 34.8958%;
        height: 14.6296%;
        background: #FAF9F6;
        border-radius: 100px;
        box-shadow: 0 0 20px rgba(0,0,0,0.1);
        z-index: 2;
    }

    /* 5) / 6) 제목 텍스트 */
    .title-record {
        position: absolute;
        left: 12.1354%; /* 233 / 1920 */
        top: 12.0370%;  /* 130 / 1080 */
        color: #EB8F26;
        font-size: 32px; /* 80% of 40px */
        font-weight: 800;
        z-index: 3;
    }
    .title-count {
        position: absolute;
        left: 57.4479%; /* 1103 / 1920 */
        top: 12.0370%;
        color: #EB8F26;
        font-size: 32px; /* 80% of 40px */
        font-weight: 800;
        z-index: 3;
    }

    /* Toggle buttons (date / period etc.) */
    .toggle {
        position: absolute;
        border-radius: 100px;
        background: #FAF9F6;
        border: 2px solid #D9D9D9;
        color: #737373;
        font-size: 19px; /* 80% of 24px ~ 19px */
        font-weight: 500;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 4;
    }

    .toggle-date { left: 12.1354%; top: 18.0556%; width: 14.2188%; height: 3.6111%; }
    .toggle-period { left: 28.2813%; top: 18.0556%; width: 14.2188%; height: 3.6111%; }
    .toggle-period-count { left: 57.4479%; top: 18.0556%; width: 14.2188%; height: 3.6111%; }
    .toggle-count-by { left: 73.5938%; top: 18.0556%; width: 14.2188%; height: 3.6111%; }

    /* 돌아가기 버튼 */
    .back-btn {
        position: absolute;
        left: 88.75%; /* 1704 / 1920 */
        top: 93.6111%; /* 1011 / 1080 */
        color: #898989;
        font-size: 26px; /* 80% of 32px ~ 25.6 -> 26px */
        font-weight: 400;
        text-decoration: underline;
        cursor: pointer;
        z-index: 5;
    }

    /* Simple responsiveness: ensure text doesn't overflow cards */
    h1 { margin: 0; padding: 0 20px; }
    </style>

</head>

<body>

    <div class="container">

        <!-- 좌우 카드 -->
        <div class="record-card"></div>
        <div class="count-card"></div>

        <!-- 내부 판 (겹쳐짐) -->
        <div class="record-inner"></div>
        <div class="count-inner"></div>

        <!-- 텍스트 -->
        <div class="title-record">일별 기록 조회</div>
        <div class="title-count">누적 횟수 조회</div>

        <!-- 토글 버튼(레이아웃용) -->
        <div class="toggle toggle-date">날짜</div>
        <div class="toggle toggle-period">누적 기간</div>
        <div class="toggle toggle-period-count">누적 기간</div>
        <div class="toggle toggle-count-by">누적 횟수 별 조회</div>

        <!-- Dropdowns: appear under toggles; initially hidden -->
        <div id="dropdown-date" class="toggle-dropdown hidden" style="position:absolute; left:12.1354%; top:22%; z-index:10; background:#fff; border:1px solid #ddd; border-radius:8px; padding:8px;">
            <input type="date" id="date-picker" />
        </div>

        <div id="dropdown-daily-period" class="toggle-dropdown hidden" style="position:absolute; left:28.2813%; top:22%; z-index:10; background:#fff; border:1px solid #ddd; border-radius:8px; padding:8px;">
            <div class="dropdown-option" data-value="전체" style="padding:6px;cursor:pointer;">전체</div>
            <div class="dropdown-option" data-value="1학기" style="padding:6px;cursor:pointer;">1학기</div>
            <div class="dropdown-option" data-value="2학기" style="padding:6px;cursor:pointer;">2학기</div>
        </div>

        <div id="dropdown-cumulative-period" class="toggle-dropdown hidden" style="position:absolute; left:57.4479%; top:22%; z-index:10; background:#fff; border:1px solid #ddd; border-radius:8px; padding:8px;">
            <div class="dropdown-option" data-value="전체" style="padding:6px;cursor:pointer;">전체</div>
            <div class="dropdown-option" data-value="1학기" style="padding:6px;cursor:pointer;">1학기</div>
            <div class="dropdown-option" data-value="2학기" style="padding:6px;cursor:pointer;">2학기</div>
        </div>

        <div id="dropdown-count-by" class="toggle-dropdown hidden" style="position:absolute; left:73.5938%; top:22%; z-index:10; background:#fff; border:1px solid #ddd; border-radius:8px; padding:8px;">
            <div class="dropdown-option" data-value="전체" style="padding:6px;cursor:pointer;">전체</div>
            <div id="option-xcount" class="dropdown-option" data-value="X회 이상" style="padding:6px;cursor:pointer;display:flex;align-items:center;">
                <span style="flex:0 0 auto;">X회 이상</span>
                <input id="count-threshold-input" type="number" min="1" placeholder="예: 2" style="width:60px;padding:6px;border-radius:6px;border:1px solid #ddd;text-align:center;margin-left:8px;" disabled />
            </div>
        </div>

        <!-- 로딩 스크린 및 관리자 패널 -->
        <div id="loading-screen" style="position:fixed;left:0;top:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.9);z-index:2000;">
            <div style="text-align:center;color:#3D403A;font-size:24px;font-weight:700;">로딩 중... 잠시만 기다려주세요.</div>
        </div>

        <div id="admin-content" class="hidden">
            <div id="admin-panel" class="hidden" style="position:relative;padding:24px;z-index:100;">
                <!-- admin panel intentionally minimal; controls are via toggle dropdowns -->
                <div style="display:flex;gap:12px;align-items:center;">
                    <button id="download-by-year-btn" style="padding:8px 12px;border-radius:6px;background:#EB8F26;color:#fff;border:none;cursor:pointer;">년도 별 기록</button>
                </div>
            </div>
        </div>

        <!-- Year download modal -->
        <div id="year-download-modal" class="hidden" style="position:fixed;left:0;top:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.4);z-index:3000;">
            <div style="background:#FFF7DA;padding:20px;border-radius:8px;min-width:320px;max-width:90%;">
                <h3 style="margin-top:0;color:#737373;">년도 선택</h3>
                <div id="year-select-list" style="max-height:300px;overflow:auto;border:1px solid #737373;padding:8px;border-radius:6px;margin-bottom:12px;"></div>
                <div style="text-align:right;display:flex;gap:8px;justify-content:flex-end;">
                    <button id="year-download-cancel" style="padding:6px 10px;border-radius:6px;background:#898989;color:#fff;border:none;">취소</button>
                    <button id="download-year-excel" style="padding:6px 10px;border-radius:6px;background:#EB8F26;color:#fff;border:none;">엑셀 다운로드(년도별)</button>
                </div>
            </div>
        </div>

        <!-- 좌측: 일별 기록 표 (지정 좌표, px 기준) -->
        <div id="daily-table-area" style="position:absolute;left:11.04%;top:28.52%;width:32.60%;height:59.72%;z-index:6;">
            <div class="area-controls" style="width:100%;box-sizing:border-box;text-align:center;vertical-align:middle;padding:6px 8px;">
                <!-- 조회 컨트롤 (토글 UI는 외부에 유지되어 있으므로 필요시 연동) -->
            </div>
            <div id="daily-table-inner" style="width:100%;height:100%;overflow-y:auto;overflow-x:hidden;box-sizing:border-box;">
                <div id="daily-table" style="width:100%;height:100%;"></div>
            </div>
            <div class="area-excel" style="width:100%;box-sizing:border-box;text-align:right;margin-top:6px;">
                <button id="excel-download-daily" style="padding:6px 10px;border-radius:6px;background:#898989;color:#fff;border:none;">엑셀 다운로드(일별)</button>
            </div>
        </div>

        <!-- 우측: 누적 횟수 표 (지정 좌표, px 기준) -->
        <div id="cumulative-table-area" style="position:absolute;left:56.35%;top:28.52%;width:32.60%;height:59.72%;z-index:6;">
            <div class="area-controls" style="width:100%;box-sizing:border-box;text-align:center;vertical-align:middle;padding:6px 8px;">
                <!-- 조회 컨트롤 (토글 UI는 외부에 유지되어 있으므로 필요시 연동) -->
            </div>
            <div id="cumulative-table-inner" style="width:100%;height:100%;overflow-y:auto;overflow-x:hidden;box-sizing:border-box;">
                <div id="cumulative-table" style="width:100%;height:100%;"></div>
            </div>
            <div class="area-excel" style="width:100%;box-sizing:border-box;text-align:right;margin-top:6px;">
                <button id="excel-download-cumulative" style="padding:6px 10px;border-radius:6px;background:#898989;color:#fff;border:none;">엑셀 다운로드(누적)</button>
            </div>
        </div>

        <!-- 돌아가기 -->
        <div class="back-btn">돌아가기</div>

    </div>

    <!-- app.js는 유지하되 기능은 별도로 사용하지 않음 -->
    <script src="app.js" type="module"></script>

</body>
</html>
